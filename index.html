<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The English Archive | Reclaiming the Margins</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville&family=Montserrat:wght@300;600&display=swap" rel="stylesheet">
    <style>
        body { background-color: #fdfaf3; font-family: 'Libre Baskerville', serif; margin: 0; color: #333; line-height: 1.6; }
        
        .hero { 
            background: linear-gradient(135deg, #1a5e63 0%, #0d2f31 100%); 
            padding: 60px 20px; text-align: center; color: white; 
        }
        .hero h1 { font-family: 'Montserrat', sans-serif; letter-spacing: 6px; color: #f4d03f; margin: 0; font-size: 2rem; }
        
        .container { max-width: 800px; margin: -30px auto 60px; padding: 0 20px; }
        
        /* Card Styling */
        .card { 
            background: white; padding: 30px; border-radius: 12px; 
            box-shadow: 0 5px 20px rgba(0,0,0,0.05); margin-bottom: 20px; 
            border: 1px solid #eee; transition: 0.3s; cursor: pointer;
            overflow: hidden;
        }
        .card:hover { transform: translateY(-3px); box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-color: #1a5e63; }
        
        .syllabus-tag { color: #b8860b; font-size: 0.7rem; font-weight: bold; text-transform: uppercase; letter-spacing: 1.2px; }
        .card h2 { font-family: 'Montserrat', sans-serif; color: #1a5e63; margin: 10px 0; font-size: 1.5rem; }
        
        /* Excerpt vs Full Content */
        .excerpt { color: #666; font-size: 1rem; display: block; }
        .full-content { display: none; margin-top: 20px; padding-top: 20px; border-top: 1px dashed #ccc; }
        .full-content img { max-width: 100%; border-radius: 8px; margin: 20px 0; }
        
        /* When card is active */
        .card.active { cursor: default; border-left: 5px solid #f4d03f; }
        .card.active .excerpt { display: none; }
        .card.active .full-content { display: block; }

        .read-more { color: #1a5e63; font-weight: bold; font-size: 0.8rem; text-transform: uppercase; margin-top: 15px; display: inline-block; }
        
        #status-msg { text-align: center; padding: 40px; font-family: 'Montserrat'; }
    </style>
</head>
<body>

<div class="hero">
    <h1>THE ENGLISH ARCHIVE</h1>
    <p>RECLAIMING THE MARGINS</p>
</div>

<div class="container">
    <div id="status-msg">📜 Unrolling the manuscripts...</div>
    <div id="articles-list"></div>
</div>

<script>
    const GITHUB_USER = "mithunbiswas15-git"; 
    const REPO_NAME = "mythra"; 
    const csvUrl = `https://raw.githubusercontent.com/${GITHUB_USER}/${REPO_NAME}/main/articles.csv`;

    function loadData() {
        Papa.parse(csvUrl, {
            download: true,
            header: true,
            skipEmptyLines: true,
            complete: function(results) {
                const list = document.getElementById('articles-list');
                document.getElementById('status-msg').style.display = 'none';
                
                // Sort Newest First
                const sorted = results.data.sort((a, b) => b.id - a.id);

                sorted.forEach(art => {
                    if(art.title && art.status === "Published") {
                        const card = document.createElement('div');
                        card.className = 'card';
                        
                        // Create a clean text summary (no HTML tags)
                        const plainText = art.content.replace(/<[^>]*>/g, '').substring(0, 120);

                        card.innerHTML = `
                            <span class="syllabus-tag">${art.syllabus || 'Archive'}</span>
                            <h2>${art.title}</h2>
                            <div class="excerpt">${plainText}... <br><span class="read-more">Click to read full note →</span></div>
                            <div class="full-content">${art.content}</div>
                        `;
                        
                        // Click to Expand Logic
                        card.onclick = function() {
                            this.classList.toggle('active');
                        };
                        
                        list.appendChild(card);
                    }
                });
            }
        });
    }
    loadData();
</script>

</body>
</html>
